name: Build coordinator image

on:
  push:
    branches: [main]
    paths:
      - "*.py"
      - requirements.txt
      - Dockerfile
      - docker-compose.yml
      - .github/workflows/build.yml
  schedule:
    # Rebuild weekly (Sunday 05:00 UTC) to pick up Python base image security patches
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/enphase-juicebox-coordinator:latest
            ghcr.io/${{ github.repository_owner }}/enphase-juicebox-coordinator:${{ github.sha }}

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.0.64
          port: 2222
          username: charles
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          envs: NAS_PASS,GOOGLE_ICAL_URLS
          script: |
            printf 'GOOGLE_ICAL_URLS=%s\n' "$GOOGLE_ICAL_URLS" > /volume1/docker/enphase-juicebox-coordinator/.env
            echo "$NAS_PASS" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/enphase-juicebox-coordinator/docker-compose.yml pull
            echo "$NAS_PASS" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/enphase-juicebox-coordinator/docker-compose.yml up -d
        env:
          NAS_PASS: ${{ secrets.NAS_SSH_PASSWORD }}
          GOOGLE_ICAL_URLS: ${{ secrets.GOOGLE_ICAL_URLS }}
