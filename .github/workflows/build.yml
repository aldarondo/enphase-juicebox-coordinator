name: Build coordinator image

on:
  push:
    branches: [main]
    paths:
      - "*.py"
      - requirements.txt
      - Dockerfile
      - docker-compose.yml
      - .github/workflows/build.yml
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/enphase-juicebox-coordinator:latest
            ghcr.io/${{ github.repository_owner }}/enphase-juicebox-coordinator:${{ github.sha }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb && sudo apt-get install -y sshpass

      - name: Deploy to NAS
        env:
          NAS_PASS: ${{ secrets.NAS_SSH_PASSWORD }}
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          GOOGLE_ICAL_URLS: ${{ secrets.GOOGLE_ICAL_URLS }}
        run: |
          # Base64-encode .env content locally so special chars survive the SSH quoting trip
          ENV_B64=$(printf 'GOOGLE_ICAL_URLS=%s\n' "$GOOGLE_ICAL_URLS" | base64 -w0)
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "echo \"$NAS_PASS\" | sudo -S bash -c \"echo $ENV_B64 | base64 -d > /volume1/docker/enphase-juicebox-coordinator/.env\" && \
             echo \"$NAS_PASS\" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/enphase-juicebox-coordinator/docker-compose.yml pull && \
             echo \"$NAS_PASS\" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/enphase-juicebox-coordinator/docker-compose.yml up -d"
